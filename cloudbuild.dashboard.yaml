# Cloud Build: admin dashboard (Vite + nginx on Cloud Run).
# Create a third trigger: config file = cloudbuild.dashboard.yaml
# Set _VITE_API_BASE to backend URL; _VITE_ADMIN_API_KEY must match backend ADMIN_API_KEY (sensitive — prefer Secret Manager + manual deploy if needed).

substitutions:
  _REGION: europe-west1
  _SERVICE: overtone-dashboard
  _AR_REPOSITORY: overtone
  _IMAGE_NAME: overtone-dashboard
  _VITE_API_BASE: https://REPLACE-WITH-YOUR-BACKEND.run.app
  _VITE_ADMIN_API_KEY: REPLACE-WITH-ADMIN-KEY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - dashboard/Dockerfile
      - --build-arg
      - VITE_API_BASE=${_VITE_API_BASE}
      - --build-arg
      - VITE_ADMIN_API_KEY=${_VITE_ADMIN_API_KEY}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - dashboard

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

options:
  logging: CLOUD_LOGGING_ONLY
