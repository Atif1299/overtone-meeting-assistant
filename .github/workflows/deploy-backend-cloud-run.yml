# Optional: deploy from GitHub Actions (requires GCP_SA_KEY + Variables in GitHub).
# Prefer Cloud Build + repo connection in GCP Console — see DEPLOY.md and cloudbuild.yaml (no GitHub secrets).
name: Deploy backend to Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-cloud-run.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        working-directory: backend
        env:
          REGION: ${{ vars.GCP_REGION }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          AR_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY }}
          IMAGE_NAME: ${{ vars.GCP_ARTIFACT_IMAGE_NAME }}
        run: |
          test -n "$REGION" && test -n "$PROJECT_ID" && test -n "$AR_REPOSITORY" && test -n "$IMAGE_NAME"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: --allow-unauthenticated --port=8080
