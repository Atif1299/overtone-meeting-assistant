# Cloud Build: presenter frontend (Vite + nginx on Cloud Run).
# Create a second trigger: config file = cloudbuild.frontend.yaml
# Set substitutions _VITE_API_BASE and _VITE_WS_BASE to your *backend* Cloud Run URL (https / wss).

substitutions:
  _REGION: europe-west1
  _SERVICE: overtone-frontend
  _AR_REPOSITORY: overtone
  _IMAGE_NAME: overtone-frontend
  _VITE_API_BASE: https://REPLACE-WITH-YOUR-BACKEND.run.app
  _VITE_WS_BASE: wss://REPLACE-WITH-YOUR-BACKEND.run.app

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - frontend/Dockerfile
      - --build-arg
      - VITE_API_BASE=${_VITE_API_BASE}
      - --build-arg
      - VITE_WS_BASE=${_VITE_WS_BASE}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - frontend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

options:
  logging: CLOUD_LOGGING_ONLY
